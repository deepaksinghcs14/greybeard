name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      # Catch a broken release config before tag time.
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: node scripts/check-adapter-copies.js
